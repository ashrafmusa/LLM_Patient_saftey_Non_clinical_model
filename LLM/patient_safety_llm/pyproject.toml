[tool.black]
line-length = 100
target-version = ["py38", "py39", "py310", "py311", "py312", "py313"]

[tool.ruff]
line-length = 100
target-version = "py38"
exclude = [
  ".venv",
  "artifacts",
  "models",
  "data",
  "notebooks",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.mypy]
python_version = "3.11"
files = ["src"]
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = false

[tool.pytest.ini_options]
addopts = "-q --maxfail=1 --disable-warnings --cov=src --cov-report=term-missing --cov-fail-under=70"
testpaths = ["tests"]
