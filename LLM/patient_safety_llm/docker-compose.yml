# Docker Compose for local development
version: '3.8'

services:
  # Streamlit UI
  ui:
    build: .
    command: streamlit run src/ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: 1

  # FastAPI server
  api:
    build: .
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: 1

  # Jupyter notebook
  notebook:
    build: .
    command: jupyter notebook --ip=0.0.0.0 --allow-root --no-browser
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      PYTHONUNBUFFERED: 1

volumes:
  app:
